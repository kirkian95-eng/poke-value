<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pokemon TCG EV Calculator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='charts.js') }}"></script>
</head>
<body>
    <nav>
        <a href="{{ url_for('dashboard') }}" class="brand"><svg class="logo" viewBox="0 0 40 40" width="28" height="28" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="top"><rect x="0" y="0" width="40" height="20"/></clipPath><clipPath id="bot"><rect x="0" y="20" width="40" height="20"/></clipPath></defs><circle cx="20" cy="20" r="19" fill="#ef5350" clip-path="url(#top)" stroke="none"/><circle cx="20" cy="20" r="19" fill="#fff" clip-path="url(#bot)" stroke="none"/><circle cx="20" cy="20" r="19" fill="none" stroke="#222" stroke-width="2"/><rect x="1" y="18" width="38" height="4" fill="#222"/><circle cx="20" cy="20" r="7" fill="#fff" stroke="#222" stroke-width="2"/><text x="20" y="27" text-anchor="middle" font-size="22" font-weight="900" fill="#1a1a2e" font-family="sans-serif">$</text></svg> poke-value</a>
        <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
        <div class="nav-links">
            <a href="{{ url_for('sets_list') }}">Sets</a>
            <div class="nav-dropdown">
                <a href="#" class="nav-dropdown-toggle" onclick="return false;">Tools &#9662;</a>
                <div class="nav-dropdown-menu">
                    <a href="{{ url_for('completion') }}">Completion Costs</a>
                    <a href="{{ url_for('rip_or_flip_page') }}">Rip or Flip</a>
                    <a href="{{ url_for('distributions') }}">Pack Distributions</a>
                    <a href="{{ url_for('compare') }}">Rarity Comparison</a>
                    <a href="{{ url_for('sealed_value') }}">Sealed Value</a>
                    <a href="{{ url_for('arbitrage') }}">Arbitrage Finder</a>
                </div>
            </div>
            <div class="nav-dropdown">
                <a href="#" class="nav-dropdown-toggle" onclick="return false;">Investing &#9662;</a>
                <div class="nav-dropdown-menu">
                    <a href="{{ url_for('pack_investment') }}">Pack ROI</a>
                    <a href="{{ url_for('chase_cards') }}">Chase Cards</a>
                    <a href="{{ url_for('psa_pop') }}">PSA Pop Report</a>
                    <a href="{{ url_for('grading') }}">Grading ROI</a>
                </div>
            </div>
            <a href="{{ url_for('about') }}">About</a>
            <form action="{{ url_for('search') }}" method="get" class="nav-search">
                <input type="text" name="q" placeholder="Search cards, sets..." value="{{ request.args.get('q', '') }}" autocomplete="off">
            </form>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
